<svg xmlns="http://www.w3.org/2000/svg" width="390" height="844" viewBox="0 0 390 844">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a2e"/>
      <stop offset="100%" style="stop-color:#2d1060"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f5d060"/>
      <stop offset="100%" style="stop-color:#e8a820"/>
    </linearGradient>
    <linearGradient id="btn" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#c2410c"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#f5d060;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#f5d060;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="390" height="844" fill="url(#bg)"/>
  <!-- Glow -->
  <ellipse cx="195" cy="380" rx="180" ry="180" fill="url(#glow)"/>
  <!-- Particle dots -->
  <circle cx="60" cy="200" r="3" fill="#f5d060" opacity="0.6"/>
  <circle cx="330" cy="180" r="2" fill="#f5d060" opacity="0.5"/>
  <circle cx="80" cy="500" r="2" fill="#f5d060" opacity="0.4"/>
  <circle cx="310" cy="520" r="3" fill="#f5d060" opacity="0.6"/>
  <circle cx="160" cy="150" r="2" fill="#c4b5fd" opacity="0.7"/>
  <circle cx="230" cy="600" r="2" fill="#c4b5fd" opacity="0.5"/>
  <!-- Header -->
  <text x="195" y="110" text-anchor="middle" font-family="Georgia,serif" font-size="13" fill="#c4b5fd" letter-spacing="2">LE PLAT GAGNANT</text>
  <!-- Large plate reveal -->
  <ellipse cx="195" cy="430" rx="140" ry="20" fill="#4c1d95" opacity="0.8"/>
  <circle cx="195" cy="400" r="130" fill="#6d28d9" opacity="0.25"/>
  <circle cx="195" cy="400" r="110" fill="white" opacity="0.1"/>
  <!-- Opened cloche -->
  <path d="M100,430 Q195,310 290,430" fill="#8b5cf6" opacity="0.6"/>
  <!-- Dish revealed -->
  <ellipse cx="195" cy="432" rx="80" ry="11" fill="#7c3aed"/>
  <ellipse cx="195" cy="432" rx="65" ry="8" fill="#d4a574"/>
  <!-- Food item on plate -->
  <ellipse cx="195" cy="415" rx="45" ry="30" fill="#c47c10" opacity="0.9"/>
  <ellipse cx="195" cy="408" rx="35" ry="20" fill="#e8a820"/>
  <!-- Prize banner -->
  <rect x="55" y="480" width="280" height="70" rx="15" fill="#000" opacity="0.5"/>
  <rect x="55" y="480" width="280" height="70" rx="15" fill="none" stroke="url(#gold)" stroke-width="2"/>
  <text x="195" y="508" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#c4b5fd">Vous remportez</text>
  <text x="195" y="540" text-anchor="middle" font-family="Georgia,serif" font-size="32" font-weight="bold" fill="url(#gold)">500 €</text>
  <!-- Continue button -->
  <rect x="80" y="590" width="230" height="55" rx="27" fill="url(#btn)"/>
  <text x="195" y="623" text-anchor="middle" font-family="Arial,sans-serif" font-size="17" font-weight="bold" fill="white" letter-spacing="2">CONTINUER</text>
  <!-- Back link -->
  <text x="195" y="685" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#c4b5fd">Retour au menu</text>
  <!-- Screen label -->
  <rect x="0" y="810" width="390" height="34" fill="#000" opacity="0.4"/>
  <text x="195" y="832" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#a78bfa" letter-spacing="3">ÉCRAN 4 — RÉVÉLATION</text>
</svg>
