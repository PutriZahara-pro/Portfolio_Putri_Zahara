<svg xmlns="http://www.w3.org/2000/svg" width="390" height="844" viewBox="0 0 390 844">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#14532d"/>
      <stop offset="50%" style="stop-color:#166534"/>
      <stop offset="100%" style="stop-color:#1a0a2e"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f5d060"/>
      <stop offset="100%" style="stop-color:#e8a820"/>
    </linearGradient>
    <linearGradient id="btn" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#4c1d95"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#22c55e;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="390" height="844" fill="url(#bg)"/>
  <ellipse cx="195" cy="320" rx="200" ry="200" fill="url(#glow)"/>
  <!-- Confetti -->
  <rect x="60" y="80" width="8" height="14" rx="2" fill="#f5d060" transform="rotate(-20 64 87)"/>
  <rect x="300" y="100" width="8" height="14" rx="2" fill="#f472b6" transform="rotate(15 304 107)"/>
  <rect x="150" y="60" width="6" height="12" rx="2" fill="#60a5fa" transform="rotate(-10 153 66)"/>
  <rect x="250" y="70" width="8" height="14" rx="2" fill="#34d399" transform="rotate(25 254 77)"/>
  <rect x="40" y="200" width="6" height="10" rx="2" fill="#f97316" transform="rotate(-30 43 205)"/>
  <rect x="340" y="220" width="8" height="14" rx="2" fill="#f5d060" transform="rotate(10 344 227)"/>
  <rect x="100" y="680" width="6" height="12" rx="2" fill="#c4b5fd" transform="rotate(-15 103 686)"/>
  <rect x="280" y="660" width="8" height="14" rx="2" fill="#fbbf24" transform="rotate(20 284 667)"/>
  <!-- Stars -->
  <g fill="url(#gold)">
    <polygon points="80,260 84,272 96,272 87,279 90,291 80,284 70,291 73,279 64,272 76,272" transform="scale(0.6) translate(58,185)"/>
    <polygon points="310,260 314,272 326,272 317,279 320,291 310,284 300,291 303,279 294,272 306,272" transform="scale(0.8) translate(80,85)"/>
    <polygon points="195,280 199,292 211,292 202,299 205,311 195,304 185,311 188,299 179,292 191,292" transform="scale(0.5) translate(210,330)"/>
  </g>
  <!-- Trophy / Crown area -->
  <g transform="translate(145,150)">
    <rect x="0" y="50" width="100" height="14" rx="2" fill="url(#gold)"/>
    <polygon points="10,50 20,22 30,50" fill="url(#gold)"/>
    <polygon points="40,50 50,8 60,50" fill="url(#gold)"/>
    <polygon points="70,50 80,22 90,50" fill="url(#gold)"/>
    <circle cx="20" cy="28" r="5" fill="#e53e3e"/>
    <circle cx="50" cy="14" r="6" fill="#9f7aea"/>
    <circle cx="80" cy="28" r="5" fill="#48bb78"/>
  </g>
  <!-- Félicitations text -->
  <text x="195" y="270" text-anchor="middle" font-family="Georgia,serif" font-size="28" font-weight="bold" fill="white">FÉLICITATIONS !</text>
  <!-- Prize display -->
  <rect x="50" y="300" width="290" height="120" rx="20" fill="#000" opacity="0.5"/>
  <rect x="50" y="300" width="290" height="120" rx="20" fill="none" stroke="url(#gold)" stroke-width="2"/>
  <text x="195" y="340" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" fill="#86efac">Vous avez remporté</text>
  <text x="195" y="390" text-anchor="middle" font-family="Georgia,serif" font-size="46" font-weight="bold" fill="url(#gold)">500 €</text>
  <!-- Info text -->
  <text x="195" y="460" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#86efac">Votre gain sera crédité sous 48h</text>
  <!-- Menu button -->
  <rect x="80" y="490" width="230" height="55" rx="27" fill="url(#btn)"/>
  <text x="195" y="523" text-anchor="middle" font-family="Arial,sans-serif" font-size="17" font-weight="bold" fill="white" letter-spacing="2">MENU</text>
  <!-- Play again -->
  <rect x="80" y="560" width="230" height="55" rx="27" fill="none" stroke="url(#gold)" stroke-width="2"/>
  <text x="195" y="593" text-anchor="middle" font-family="Arial,sans-serif" font-size="15" fill="url(#gold)" letter-spacing="1">REJOUER</text>
  <!-- Screen label -->
  <rect x="0" y="810" width="390" height="34" fill="#000" opacity="0.4"/>
  <text x="195" y="832" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#86efac" letter-spacing="3">ÉCRAN 5 — FÉLICITATIONS</text>
</svg>
