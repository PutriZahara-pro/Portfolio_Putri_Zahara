<svg xmlns="http://www.w3.org/2000/svg" width="390" height="844" viewBox="0 0 390 844">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a2e"/>
      <stop offset="100%" style="stop-color:#2d1060"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f5d060"/>
      <stop offset="100%" style="stop-color:#e8a820"/>
    </linearGradient>
    <linearGradient id="btn" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#c2410c"/>
    </linearGradient>
  </defs>
  <rect width="390" height="844" fill="url(#bg)"/>
  <!-- Stars -->
  <circle cx="50" cy="100" r="1.5" fill="#f5d060" opacity="0.8"/>
  <circle cx="340" cy="150" r="1" fill="#f5d060" opacity="0.6"/>
  <circle cx="80" cy="400" r="1.5" fill="#f5d060" opacity="0.5"/>
  <circle cx="360" cy="350" r="1" fill="#f5d060" opacity="0.7"/>
  <circle cx="20" cy="600" r="2" fill="#f5d060" opacity="0.4"/>
  <circle cx="370" cy="550" r="1.5" fill="#f5d060" opacity="0.6"/>
  <!-- Crown -->
  <g transform="translate(155,120)">
    <rect x="0" y="40" width="80" height="12" rx="2" fill="url(#gold)"/>
    <polygon points="8,40 16,18 24,40" fill="url(#gold)"/>
    <polygon points="32,40 40,8 48,40" fill="url(#gold)"/>
    <polygon points="56,40 64,18 72,40" fill="url(#gold)"/>
    <circle cx="16" cy="24" r="4" fill="#e53e3e"/>
    <circle cx="40" cy="14" r="5" fill="#9f7aea"/>
    <circle cx="64" cy="24" r="4" fill="#48bb78"/>
  </g>
  <!-- Title -->
  <text x="195" y="230" text-anchor="middle" font-family="Georgia,serif" font-size="22" font-weight="bold" fill="url(#gold)" letter-spacing="3">CUISINE ROYALE</text>
  <!-- Plate illustration -->
  <ellipse cx="195" cy="430" rx="120" ry="16" fill="#5b21b6" opacity="0.6"/>
  <circle cx="195" cy="410" r="110" fill="#6d28d9" opacity="0.3"/>
  <circle cx="195" cy="410" r="95" fill="white" opacity="0.12"/>
  <!-- Cloche -->
  <path d="M130,430 Q195,350 260,430" fill="#a78bfa" opacity="0.8"/>
  <ellipse cx="195" cy="432" rx="65" ry="9" fill="#7c3aed" opacity="0.9"/>
  <rect x="188" y="348" width="14" height="10" rx="3" fill="#c4b5fd"/>
  <!-- Win text -->
  <text x="195" y="530" text-anchor="middle" font-family="Georgia,serif" font-size="14" fill="#e9d5ff" letter-spacing="1">GAGNEZ JUSQU'À</text>
  <text x="195" y="565" text-anchor="middle" font-family="Georgia,serif" font-size="36" font-weight="bold" fill="url(#gold)">20 000€ !</text>
  <!-- Play button -->
  <rect x="80" y="610" width="230" height="60" rx="30" fill="url(#btn)"/>
  <text x="195" y="648" text-anchor="middle" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="white" letter-spacing="2">JOUEZ 2€</text>
  <!-- Rules link -->
  <text x="195" y="720" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#c4b5fd" text-decoration="underline">RÈGLES DU JEU</text>
  <!-- Screen label -->
  <rect x="0" y="810" width="390" height="34" fill="#000" opacity="0.4"/>
  <text x="195" y="832" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#a78bfa" letter-spacing="3">ÉCRAN 1 — MENU PRINCIPAL</text>
</svg>
